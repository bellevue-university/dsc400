title: Introduction to Big Data
lesson_number: 1
objectives:
  - Design a simple end-to-end big data analysis workflows using various analytics workflow patterns
  - Describe the differences between descriptive, diagnostic, predictive, and prescriptive analytics
  - Estimate the key metrics associated with big data workflows including storage and bandwidth requirements
  - Develop big data analytics use cases for a specific industry or domain of interest
readings:
  - Chapter 1 in **Big Data Science and Analytics**
exercise:
  title: Characteristics of Big Data
discussion:
  title: Big Data Applications and Use Cases
  instructions: >
    Research applications of big data analysis for a specific subject area.
    You can pick an example from the book or a domain that is of personal interest.
    Discuss how big data is being used or could be used in that domain.
    Provide metrics that describe the volume, velocity, and variety of the datasets involved.
